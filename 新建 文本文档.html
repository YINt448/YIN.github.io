<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>极简导航 · 现代响应式</title>
    <!-- 使用 Inter 字体，更现代 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 免费图标库 (用于汉堡菜单、搜索引擎图标等) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #0f172a;
            line-height: 1.5;
        }

        /* 经典左侧导航 + 右侧内容布局 */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* ---------- 左侧导航 (sticky) ---------- */
        .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 260px;
            background-color: white;
            border-right: 1px solid #e9eef2;
            padding: 2rem 0.75rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
            transition: transform 0.25s ease;
            z-index: 50;
            box-shadow: 2px 0 12px rgba(0,0,0,0.02);
        }

        /* Logo 区域 */
        .logo-area {
            padding: 0 1rem 2rem 1rem;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #0a2540;
            border-bottom: 1px solid #f1f5f9;
            margin-bottom: 1.5rem;
        }
        .logo-icon {
            background: #1e3a8a;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* 导航按钮容器 */
        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .nav-btn {
            background: transparent;
            border: none;
            text-align: left;
            padding: 0.85rem 1.2rem;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 14px;
            color: #475569;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-btn i {
            width: 22px;
            font-size: 1.2rem;
            color: #94a3b8;
        }
        .nav-btn:hover {
            background-color: #f1f5f9;
            color: #1e293b;
        }
        .nav-btn.active {
            background-color: #e8edff;
            color: #1e3a8a;
            font-weight: 600;
            box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.2);
        }
        .nav-btn.active i {
            color: #2563eb;
        }

        /* 汉堡菜单 (移动端显示) */
        .mobile-header {
            display: none;
            position: sticky;
            top: 0;
            z-index: 60;
            background: white;
            padding: 1rem 1.5rem;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid #e9eef2;
            box-shadow: 0 4px 6px -4px rgba(0,0,0,0.02);
        }
        .hamburger {
            background: none;
            border: 1px solid #e2e8f0;
            font-size: 1.5rem;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            color: #334155;
            transition: background 0.1s;
        }
        .hamburger:hover {
            background: #f1f5f9;
        }
        .mobile-logo {
            font-weight: 600;
            font-size: 1.4rem;
            color: #0a2540;
        }

        /* ---------- 右侧主区 ---------- */
        .main-content {
            flex: 1;
            min-width: 0; /* 防止溢出 */
            background-color: #ffffff;
        }

        /* 右侧内边距，让内容呼吸 */
        .content-wrapper {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 2.5rem 4rem 2.5rem;
        }

        /* ----- 搜索区域 (多引擎切换) ----- */
        .search-section {
            margin-bottom: 3rem;
            background: #f8fafc;
            padding: 1.8rem 2rem;
            border-radius: 32px;
            box-shadow: 0 8px 20px -8px rgba(0, 34, 64, 0.08);
            border: 1px solid #f0f4f9;
        }
        .search-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .engine-switch {
            display: flex;
            background: white;
            padding: 4px;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .engine-btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .engine-btn i {
            font-size: 1rem;
        }
        .engine-btn.active {
            background: #1e3a8a;
            color: white;
            box-shadow: 0 4px 8px rgba(30, 58, 138, 0.2);
        }
        .search-box-wrapper {
            flex: 1;
            min-width: 240px;
            display: flex;
            background: white;
            border-radius: 56px;
            border: 1px solid #e2e8f0;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            align-items: center;
            transition: box-shadow 0.15s, border-color 0.15s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .search-box-wrapper:focus-within {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.15);
        }
        .search-input {
            flex: 1;
            border: none;
            padding: 1rem 0;
            font-size: 1rem;
            background: transparent;
            outline: none;
        }
        .search-submit {
            background: #1e3a8a;
            border: none;
            color: white;
            width: 52px;
            height: 52px;
            border-radius: 52px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-submit:hover {
            background: #2563eb;
        }

        /* 分类区域 (内容区) */
        .category-block {
            margin-bottom: 3rem;
            scroll-margin-top: 20px;  /* 平滑滚动偏移 */
        }
        .category-header {
            margin-bottom: 1.5rem;
        }
        .category-title {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0f172a;
            margin-bottom: 0.75rem;
        }

        /* 二级分类 tabs */
        .sub-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 2rem;
            border-bottom: 1px solid #eef2f6;
            padding-bottom: 0.5rem;
        }
        .sub-tab {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 30px;
            color: #64748b;
            cursor: pointer;
            transition: all 0.1s;
        }
        .sub-tab.active {
            background: #1e293b;
            color: white;
        }

        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        /* 卡片设计 */
        .nav-card {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 20px;
            padding: 1.2rem 1.2rem;
            border: 1px solid #f0f4fa;
            box-shadow: 0 8px 18px -6px rgba(0, 20, 40, 0.04);
            transition: all 0.2s cubic-bezier(0.2,0,0,1);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            gap: 16px;
        }
        .nav-card:hover {
            transform: translateY(-4px);
            border-color: #d9e2ef;
            box-shadow: 0 20px 24px -12px rgba(30, 58, 138, 0.18);
            background-color: #fcfdff;
        }
        /* 左侧图标区 */
        .card-icon {
            width: 52px;
            height: 52px;
            background: #eef4ff;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #1e3a8a;
            transition: 0.15s;
            flex-shrink: 0;
        }
        .nav-card:hover .card-icon {
            background: #e0eaff;
        }
        .card-info {
            flex: 1;
            min-width: 0;
        }
        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 4px;
            color: #0f172a;
        }
        .card-desc {
            font-size: 0.85rem;
            color: #64748b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 滚动监听辅助：高亮由js控制，但预留样式 */
        .hidden-mobile {
            display: flex;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                transform: translateX(-100%);
                width: 280px;
                box-shadow: 4px 0 30px rgba(0,0,0,0.15);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .mobile-header {
                display: flex;
            }
            .app {
                flex-direction: column;
            }
            .main-content {
                width: 100%;
            }
            .content-wrapper {
                padding: 1.5rem 1.2rem;
            }
            .search-section {
                padding: 1.2rem;
            }
            .engine-btn {
                padding: 0.5rem 1rem;
            }
        }

        /* 遮罩层 (移动端) */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 45;
            backdrop-filter: blur(2px);
        }
        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- 移动端顶部汉堡 -->
    <div class="mobile-header">
        <button class="hamburger" id="menuToggle" aria-label="菜单"><i class="fas fa-bars"></i></button>
        <span class="mobile-logo"><i class="fas fa-compass" style="color: #1e3a8a;"></i> 方位</span>
    </div>
    <!-- 左侧导航 sidebar (sticky) -->
    <aside class="sidebar" id="sidebar">
        <div class="logo-area">
            <span class="logo-icon"><i class="fas fa-location-arrow"></i></span>
            <span>方位·dir</span>
        </div>
        <div class="nav-buttons" id="navButtons">
            <!-- 动态由js生成, 但也可静态写好 为了方便直接静态 + js关联 -->
            <button class="nav-btn" data-target="tech"><i class="fas fa-microchip"></i> 科技</button>
            <button class="nav-btn" data-target="design"><i class="fas fa-paint-brush"></i> 设计</button>
            <button class="nav-btn" data-target="ai"><i class="fas fa-robot"></i> 人工智能</button>
            <button class="nav-btn" data-target="resource"><i class="fas fa-database"></i> 资源</button>
        </div>
        <!-- 底部点缀 (可省略) -->
        <div style="margin-top: auto; font-size:0.8rem; color:#94a3b8; padding:1.5rem 1rem 0; border-top: 1px solid #edf2f7;">
            <i class="fas fa-bookmark"></i> 我的导航
        </div>
    </aside>
    <!-- 遮罩 (移动端点击关闭) -->
    <div class="overlay" id="overlay"></div>

    <!-- 右侧主要内容区 -->
    <main class="main-content">
        <div class="content-wrapper">
            <!-- 搜索区 -->
            <div class="search-section">
                <div class="search-panel">
                    <div class="engine-switch" id="engineSwitch">
                        <button class="engine-btn active" data-engine="baidu"><i class="fab fa-baidu"></i> 百度</button>
                        <button class="engine-btn" data-engine="google"><i class="fab fa-google"></i> 谷歌</button>
                        <button class="engine-btn" data-engine="bing"><i class="fab fa-microsoft"></i> 必应</button>
                    </div>
                    <div class="search-box-wrapper">
                        <input type="text" class="search-input" id="searchInput" placeholder="搜索你想要的...">
                        <button class="search-submit" id="searchBtn"><i class="fas fa-search"></i></button>
                    </div>
                </div>
            </div>

            <!-- 内容展示区：按分类顺序 tech, design, ai, resource -->
            <section id="tech" class="category-block" data-category="tech">
                <div class="category-header">
                    <h2 class="category-title"><i class="fas fa-microchip" style="margin-right:10px;"></i>科技前沿</h2>
                </div>
                <!-- 二级分类 tabs (每个一级分类下不同) -->
                <div class="sub-tabs" id="subTech">
                    <button class="sub-tab active" data-sub="dev">开发</button>
                    <button class="sub-tab" data-sub="product">产品</button>
                    <button class="sub-tab" data-sub="news">资讯</button>
                </div>
                <!-- 卡片网格 开发 -->
                <div class="card-grid" data-subgroup="dev">
                    <a href="https://github.com" class="nav-card" target="_blank">
                        <div class="card-icon"><i class="fab fa-github"></i></div>
                        <div class="card-info"><div class="card-title">GitHub</div><div class="card-desc">代码与协作</div></div>
                    </a>
                    <a href="https://stackoverflow.com" class="nav-card" target="_blank">
                        <div class="card-icon"><i class="fab fa-stack-overflow"></i></div>
                        <div class="card-info"><div class="card-title">Stack Overflow</div><div class="card-desc">问答社区</div></div>
                    </a>
                    <a href="https://developer.mozilla.org" class="nav-card" target="_blank">
                        <div class="card-icon"><i class="fas fa-file-code"></i></div>
                        <div class="card-info"><div class="card-title">MDN</div><div class="card-desc">Web 标准</div></div>
                    </a>
                </div>
                <!-- 卡片网格 产品 (默认隐藏，简单实现tab切换：通过js控制显示) 后面同样 -->
                <div class="card-grid" data-subgroup="product" style="display:none;">
                    <a href="https://www.figma.com" class="nav-card" target="_blank">
                        <div class="card-icon"><i class="fab fa-figma"></i></div><div class="card-info"><div class="card-title">Figma</div><div class="card-desc">协作设计</div></div>
                    </a>
                    <a href="https://www.notion.so" class="nav-card" target="_blank">
                        <div class="card-icon"><i class="fas fa-notebook"></i></div><div class="card-info"><div class="card-title">Notion</div><div class="card-desc">文档&维基</div></div>
                    </a>
                </div>
                <div class="card-grid" data-subgroup="news" style="display:none;">
                    <a href="https://techcrunch.com" class="nav-card" target="_blank">
                        <div class="card-icon"><i class="fas fa-newspaper"></i></div><div class="card-info"><div class="card-title">TechCrunch</div><div class="card-desc">科技新闻</div></div>
                    </a>
                </div>
            </section>

            <section id="design" class="category-block" data-category="design">
                <div class="category-header"><h2 class="category-title"><i class="fas fa-paint-brush"></i> 设计创意</h2></div>
                <div class="sub-tabs" id="subDesign">
                    <button class="sub-tab active" data-sub="ui">UI/UX</button>
                    <button class="sub-tab" data-sub="graphic">平面</button>
                </div>
                <div class="card-grid" data-subgroup="ui">
                    <a href="https://dribbble.com" class="nav-card" target="_blank"><div class="card-icon"><i class="fab fa-dribbble"></i></div><div class="card-info"><div class="card-title">Dribbble</div><div class="card-desc">UI 灵感</div></div></a>
                    <a href="https://www.behance.net" class="nav-card" target="_blank"><div class="card-icon"><i class="fab fa-behance"></i></div><div class="card-info"><div class="card-title">Behance</div><div class="card-desc">作品集</div></div></a>
                </div>
                <div class="card-grid" data-subgroup="graphic" style="display:none;">
                    <a href="https://colorhunt.co" class="nav-card" target="_blank"><div class="card-icon"><i class="fas fa-palette"></i></div><div class="card-info"><div class="card-title">Color Hunt</div><div class="card-desc">配色方案</div></div></a>
                </div>
            </section>

            <section id="ai" class="category-block" data-category="ai">
                <div class="category-header"><h2 class="category-title"><i class="fas fa-robot"></i> 人工智能</h2></div>
                <div class="sub-tabs"><button class="sub-tab active" data-sub="chat">聊天</button><button class="sub-tab" data-sub="image">图像</button></div>
                <div class="card-grid" data-subgroup="chat">
                    <a href="https://chat.openai.com" class="nav-card" target="_blank"><div class="card-icon"><i class="fas fa-comment-dots"></i></div><div class="card-info"><div class="card-title">ChatGPT</div><div class="card-desc">OpenAI</div></div></a>
                    <a href="https://claude.ai" class="nav-card" target="_blank"><div class="card-icon"><i class="fas fa-comments"></i></div><div class="card-info"><div class="card-title">Claude</div><div class="card-desc">Anthropic</div></div></a>
                </div>
                <div class="card-grid" data-subgroup="image" style="display:none;">
                    <a href="https://www.midjourney.com" class="nav-card" target="_blank"><div class="card-icon"><i class="fas fa-image"></i></div><div class="card-info"><div class="card-title">Midjourney</div><div class="card-desc">AI 绘画</div></div></a>
                </div>
            </section>

            <section id="resource" class="category-block" data-category="resource">
                <div class="category-header"><h2 class="category-title"><i class="fas fa-database"></i> 资源下载</h2></div>
                <div class="sub-tabs"><button class="sub-tab active" data-sub="font">字体</button><button class="sub-tab" data-sub="pic">图库</button></div>
                <div class="card-grid" data-subgroup="font">
                    <a href="https://fonts.google.com" class="nav-card" target="_blank"><div class="card-icon"><i class="fas fa-font"></i></div><div class="card-info"><div class="card-title">Google Fonts</div><div class="card-desc">免费字体</div></div></a>
                </div>
                <div class="card-grid" data-subgroup="pic" style="display:none;">
                    <a href="https://unsplash.com" class="nav-card" target="_blank"><div class="card-icon"><i class="fas fa-camera"></i></div><div class="card-info"><div class="card-title">Unsplash</div><div class="card-desc">高质量图片</div></div></a>
                </div>
            </section>
        </div>
    </main>
</div>

<script>
    (function() {
        // ---------- DOM 元素 ----------
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuToggle = document.getElementById('menuToggle');
        const navButtons = document.querySelectorAll('.nav-btn');
        const sections = document.querySelectorAll('.category-block');
        const engineBtns = document.querySelectorAll('.engine-btn');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');

        // 当前搜索引擎
        let currentEngine = 'baidu';

        // ---------- 移动端菜单 ----------
        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        }
        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            if (sidebar.classList.contains('open')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        });
        overlay.addEventListener('click', closeSidebar);
        // 点击导航后自动关闭(移动端)
        navButtons.forEach(btn => btn.addEventListener('click', () => {
            if (window.innerWidth <= 768) closeSidebar();
        }));

        // ---------- 搜索引擎切换 + 搜索功能 ----------
        engineBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                engineBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentEngine = btn.dataset.engine;
            });
        });

        function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;
            let url = '';
            if (currentEngine === 'baidu') {
                url = `https://www.baidu.com/s?wd=${encodeURIComponent(query)}`;
            } else if (currentEngine === 'google') {
                url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            } else if (currentEngine === 'bing') {
                url = `https://www.bing.com/search?q=${encodeURIComponent(query)}`;
            }
            window.open(url, '_blank');
        }
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });

        // ---------- 二级标签切换 (使用事件委托) ----------
        document.querySelectorAll('.sub-tabs').forEach(tabContainer => {
            const parentBlock = tabContainer.closest('.category-block');
            tabContainer.addEventListener('click', (e) => {
                const targetTab = e.target.closest('.sub-tab');
                if (!targetTab) return;
                // 切换当前容器内tab active
                Array.from(tabContainer.querySelectorAll('.sub-tab')).forEach(t => t.classList.remove('active'));
                targetTab.classList.add('active');

                const subGroup = targetTab.dataset.sub;
                // 找到该分类下所有 card-grid
                const grids = parentBlock.querySelectorAll('.card-grid');
                grids.forEach(grid => {
                    if (grid.dataset.subgroup === subGroup) {
                        grid.style.display = 'grid';
                    } else {
                        grid.style.display = 'none';
                    }
                });
            });
        });

        // ---------- 滚动监听 (Scroll Spy) + 高亮左侧导航 ----------
        function updateActiveNavOnScroll() {
            let currentSectionId = '';
            const scrollPos = window.scrollY + 100;  // 偏移量

            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                const sectionBottom = sectionTop + section.offsetHeight;
                if (scrollPos >= sectionTop && scrollPos < sectionBottom) {
                    currentSectionId = section.getAttribute('id');
                }
            });

            navButtons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.target === currentSectionId) {
                    btn.classList.add('active');
                }
            });
        }
        window.addEventListener('scroll', updateActiveNavOnScroll);
        window.addEventListener('load', updateActiveNavOnScroll); // 初始

        // ---------- 点击左侧导航平滑滚动 ----------
        navButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const targetId = btn.dataset.target; // tech, design...
                const targetSection = document.getElementById(targetId);
                if (targetSection) {
                    targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });

        // ---------- 确保刚加载时第一个分类高亮 (如果scroll没触发) ----------
        setTimeout(updateActiveNavOnScroll, 100);
        // 窗口resize时重新计算
        window.addEventListener('resize', updateActiveNavOnScroll);

        // ---------- 小细节：让卡片点击在新标签页打开 (已经在<a>中用target="_blank"实现) ----------
        // 额外样式: 所有卡片都是a标签，不用额外处理

        // 初始化打开时，将第一个sub-tab对应的grid显示正确(已经默认active和第一个grid显示，但隐藏的需要隐藏)
        // 手动触发一次确保二级标签正确对应（以防初始隐藏错乱）
        document.querySelectorAll('.sub-tabs').forEach(tabContainer => {
            const activeTab = tabContainer.querySelector('.sub-tab.active');
            if (activeTab) {
                const sub = activeTab.dataset.sub;
                const parentBlock = tabContainer.closest('.category-block');
                parentBlock.querySelectorAll('.card-grid').forEach(g => {
                    g.style.display = g.dataset.subgroup === sub ? 'grid' : 'none';
                });
            }
        });
    })();
</script>
<!-- 附加说明：所有交互符合滚动监听，点击高亮，卡片新窗口，搜索切换，移动端汉堡菜单，响应式 -->
</body>
